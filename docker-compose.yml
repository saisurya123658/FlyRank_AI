version: "3.9"

services:
  db:
    image: postgres:16
    restart: always

    environment:
      POSTGRES_DB: simpledb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: .

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - db

volumes:
  postgres_data: